# ============================================================================
#  SkyrimNet Baka Integration — paired-animation offsets   (EDIT THIS FILE)
# ============================================================================
#  Places the VICTIM relative to the ATTACKER. The attacker is the origin
#  (0,0,0) and faces "forward"; an NPC attacker is teleported onto the victim
#  first, the player is never teleported. ONE entry per ANIMATION — the same
#  entry is used for player->NPC, NPC->player and NPC->NPC.
#
#  Axes (all numbers are Skyrim units; ~70 units ~= 1 metre):
#     .x   = victim sideways:  RIGHT (+)  /  LEFT (-)
#     .y   = victim forward:   FRONT (+)  /  BACK  (-)
#     .z   = victim height:    UP (+)     /  DOWN  (-)      0 = same height
#     .rot = victim facing minus attacker facing, in degrees:
#               0  = both face the SAME way (e.g. a hug from behind)
#             180  = they face EACH OTHER (kisses, front hug)
#
#  WHY MOST ARE 0,0,0:  these Babo/SLAP animations bake the actor-to-actor
#  spacing INTO the animation file, so they are meant to be played co-located
#  (offset 0) — the clip itself pulls the two apart correctly. Babo's own data
#  only adds an offset on the *victim* (actor 2) when a clip needs it (same
#  forward/side/rotate idea as here). So start at 0; only nudge if a clip looks
#  wrong, and keep the nudge small.
#
#  THE KEY is the ANIMATION NAME. It is printed at the start of the on-screen
#  "[Baka] <key>: victim vs attacker(0,0,0) = ..." line every scene (turn on
#  bDebugPositions). Whatever name it shows IS the key to edit below.
#
#  HOW TO TUNE: change a number, SAVE this file, then RELOAD A SAVE in-game
#  (no recompile, no Skyrim restart). Watch the [Baka] line for the result.
#  Lines you delete/omit fall back to the built-in default. '#' or ';' = comment.
# ============================================================================


