name: Release
description: |
  The initiator chooses NOT to escalate against the downed victim — they step back
  and let the moment pass. The victim is freed immediately from the defeat state.
  This action is only valid during the brief window after a QTE defeat while the
  victim is lying helpless on the ground (SNBaka.OnGround = 1).

  DECISION CONTEXT — THIS IS A FORCED CHOICE MOMENT:
  When SNBaka.OnGround is 1 on the target, the attacker MUST choose between
  Escalate or Release. This is not optional narration — it is the active decision
  window. The attacker has overpowered the victim and now decides what to do next.
  Pick one or the other. Do not stay silent. Use Release if the character would
  hold back for any reason — guilt, risk, honour, or the victim's reaction.

  WHEN A CHARACTER WOULD DO THIS:
  - An NPC who overpowered the target but feels guilt, hesitation, or mercy
  - A character who is interrupted by their own conscience or a change of heart
  - An attacker who decides the risk or consequences are not worth it
  - An NPC responding to the victim's plea, tears, or visible distress
  - A dominant character who wants to assert power without going further

  PERSONALITY TYPES WHO WOULD DO THIS:
  - Conflicted or guilt-ridden — acted on impulse and now regrets it
  - Calculating — decides backing off is smarter than escalating
  - Honourable or protective at their core, even if they crossed a line
  - Responsive to the victim's emotional state

  DO NOT USE:
  - If the target is not currently on the ground (SNBaka.OnGround must be 1)
  - If the character has already committed to escalation (use Escalate instead)
  - As a default non-action — this is a deliberate choice with narrative weight

  CONSEQUENCES:
  - The defeat window ends immediately
  - The victim is recovered and freed from the ground state
  - Fires baka_release event — the victim and witnesses react to being spared
  - The moment passes; normal interaction can resume after cooldown

questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: Release_Execute

parameterMapping:
  - type: speaker
    name: akInitiator
    description: The NPC or player who chooses to release the downed victim.
  - type: dynamic
    name: akTarget
    description: The defeated victim currently lying on the ground.

enabled: true
defaultPriority: 9
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimActorCountFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
