name: pose_present
description: |
  The speaker bends forward / gets on all fours / presents themselves for a few seconds — a
  vulnerable, submissive, exposed posture (bent at the waist, hands on knees, kneeling forward,
  or down on all fours).

  USE WHEN: a submission, humiliation, or erotic-power context calls for the speaker to present
  or offer themselves — commanded by a dominant party, a captive made to assume the position,
  bending over furniture, or a willing submissive display.

  REQUIRES a dominant-submissive, captive, or explicit erotic context. DO NOT USE in ordinary
  conversation — this is an overtly vulnerable/sexual posture.

  Body language only — no dialogue. Held briefly, then they rise. Picks a random pose from a
  bend-over/presenting set, so it varies between characters.

questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: PosePresent_Execute

parameterMapping:
  - type: speaker
    name: akInitiator
    description: The character presenting themselves
  - type: dynamic
    name: akTarget
    description: The dominant party they present to (optional context; not required)

enabled: true
defaultPriority: 2

eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
