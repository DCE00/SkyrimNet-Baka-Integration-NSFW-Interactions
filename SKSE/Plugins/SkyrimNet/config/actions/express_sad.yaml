name: express_sad
description: |
  The speaker's face turns sad — downturned mouth, sorrowful brow, a hurt or mournful look —
  for a few seconds.

  USE WHEN: the speaker feels sadness, grief, disappointment, hurt, or despair right now —
  rejection, loss, cruelty directed at them, or a painful memory.

  Purely a facial expression — no body movement, no dialogue. It fades on its own.

questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: ExpressSad_Execute

parameterMapping:
  - type: speaker
    name: akInitiator
    description: The character whose face shows the expression
  - type: dynamic
    name: akTarget
    description: Who they are reacting to (optional context; not required)

enabled: true
defaultPriority: 2

customCategory: expression
