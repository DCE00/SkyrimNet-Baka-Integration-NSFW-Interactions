name: Escalate
description: |
  The initiator moves in on a defeated, helpless victim who is lying on the ground
  after being overcome in a struggle. This action is only valid during the brief
  window after a QTE defeat — the victim is restrained and cannot resist further.
  Triggers the escalation phase: a choke-hold animation followed by a final QTE.
  If the attacker wins that QTE, a SexLab aggressive scene begins.

  DECISION CONTEXT — THIS IS A FORCED CHOICE MOMENT:
  When SNBaka.OnGround is 1 on the target, the attacker MUST choose between
  Escalate or Release. This is not optional narration — it is the active decision
  window. The attacker has overpowered the victim and now decides what to do next.
  Pick one or the other. Do not stay silent.

  WHEN A CHARACTER WOULD DO THIS:
  - A dominant, predatory character who sees an opportunity and takes it
  - An NPC who just physically overpowered the target and wants to push further
  - A character who was waiting for the target to be vulnerable
  - An opportunist who was nearby and sees the target helpless on the ground

  PERSONALITY TYPES WHO WOULD DO THIS:
  - Predatory, dominant, or power-hungry
  - Lacking restraint or moral hesitation in this moment
  - Sexually aggressive or coercive by nature
  - Emboldened by having just seen the target defeated

  DO NOT USE:
  - If the target is not currently on the ground / defeated (the Papyrus function
    checks SNBaka.OnGround and will silently no-op if conditions are not met)
  - In public or crowded areas unless the character is reckless
  - For characters who are honourable, protective, or would be repulsed by assault
  - Use Release instead if the character has any hesitation or moral restraint

  CONSEQUENCES:
  - Plays DefeatResist chokehold animation on both actors
  - SexLab aggressive scene begins immediately after the choke animation

questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: Escalate_Execute

parameterMapping:
  - type: speaker
    name: akInitiator
    description: The NPC choosing to escalate against the downed target.
  - type: dynamic
    name: akTarget
    description: The defeated target lying helpless on the ground.

enabled: true
defaultPriority: 9