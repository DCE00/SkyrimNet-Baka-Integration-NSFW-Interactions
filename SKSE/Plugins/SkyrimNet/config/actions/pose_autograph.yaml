name: PoseAutograph
description: |
  YOU mime signing an autograph with a flourish.
  USE WHEN: a fan or admirer asks, showing off fame or status, or playing the gracious celebrity.
  Solo gesture, no target, no dialogue (mimed, no prop needed).
questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: PoseAutograph_Execute
parameterMapping:
  - type: speaker
    name: akInitiator
    description: The character signing an autograph.
enabled: true
defaultPriority: 2
customCategory: SNBaka_Pose
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_busy"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimActorCountFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
