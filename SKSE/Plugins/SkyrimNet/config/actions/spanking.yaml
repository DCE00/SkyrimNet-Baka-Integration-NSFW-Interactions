name: Spanking
description: |
  The initiator strikes the target's backside with an open hand. This is a single-blow
  disciplinary or playful action. The initiator approaches from behind and to the side.
  A smack sound plays on impact. May be punishing, dominant, flirtatious, or playful.

  WHEN A CHARACTER WOULD DO THIS:
  - A dominant character delivering discipline for perceived misbehavior
  - A playful or flirtatious character acting impulsively during a light moment
  - A possessive partner asserting physical authority in an intimate context
  - A guard or authority figure delivering physical punishment
  - A character teasing or provoking the target in a way they expect will be tolerated

  PERSONALITY TYPES WHO WOULD DO THIS:
  - Dominant, disciplinary, or authoritative
  - Playful and mischievous — treats this as a joke or tease
  - Possessive intimate partner who expresses ownership physically
  - Misogynistic or entitled — believes they have the right to do this

  DO NOT USE:
  - As a severe or traumatic act — this is a single light strike, not a beating
  - During active combat or crisis
  - When the initiator has no social standing, dominance, or relationship with the target

  CONSEQUENCES:
  - Brief physical act — the sting is immediate and fades
  - Smack sound plays, making it audible to nearby actors
  - Reaction ranges from amusement to humiliation depending on relationship and personality

questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: Spanking_Execute

parameterMapping:
  - type: speaker
    name: akInitiator
    description: The NPC delivering the spank.
  - type: dynamic
    name: akTarget
    description: The person being spanked — player or nearby NPC.

enabled: true
defaultPriority: 2
customCategory: spanking
