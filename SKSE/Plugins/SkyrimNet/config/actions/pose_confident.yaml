name: pose_confident
description: |
  The speaker strikes a confident, assertive standing pose for a few seconds — hands on hips,
  arms crossed, a bold power stance — projecting self-assurance or dominance.

  USE WHEN: the speaker wants to look in control, proud, defiant, smug, or commanding — making
  a point, sizing someone up, showing off authority, or refusing to be intimidated.

  Body language only — no dialogue. The pose is held briefly, then they relax. Picks a random
  pose from a confident set, so it varies between characters.

questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: PoseConfident_Execute

parameterMapping:
  - type: speaker
    name: akInitiator
    description: The character striking the pose
  - type: dynamic
    name: akTarget
    description: Who they are posing toward (optional context; not required)

enabled: true
defaultPriority: 2

eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
