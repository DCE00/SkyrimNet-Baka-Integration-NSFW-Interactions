name: pose_kneel
description: |
  The speaker kneels or settles to the ground for a few seconds — kneeling upright, sitting back
  on the heels, or a low resting crouch.

  USE WHEN: the speaker submits, yields, pleads, prays, rests, or is made to kneel — a captive
  forced down, a supplicant begging, someone exhausted sinking to the ground, or waiting
  obediently on their knees.

  Fits submission, defeat, worship, or weary-rest contexts. Body language only — no dialogue.
  Held briefly, then they rise. Picks a random pose from a kneeling/resting set, so it varies
  between characters.

questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: PoseKneel_Execute

parameterMapping:
  - type: speaker
    name: akInitiator
    description: The character kneeling
  - type: dynamic
    name: akTarget
    description: Who they kneel before (optional context; not required)

enabled: true
defaultPriority: 2

eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
