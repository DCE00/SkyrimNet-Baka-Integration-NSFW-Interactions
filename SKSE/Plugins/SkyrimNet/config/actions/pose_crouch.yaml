name: PoseCrouch
description: |
  YOU crouch down low and hold it.
  USE WHEN: hiding, sneaking, taking cover, examining something on the ground, or keeping a low profile.
  Solo body pose, no target, no dialogue. Ends on its own or if a fight starts.
questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: PoseCrouch_Execute
parameterMapping:
  - type: speaker
    name: akInitiator
    description: The character who crouches.
enabled: true
defaultPriority: 2
customCategory: SNBaka_Pose
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_busy"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimActorCountFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
