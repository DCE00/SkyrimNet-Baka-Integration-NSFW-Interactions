name: PoseDrink
description: |
  YOU (a woman) take a drink -- and you might overdo it.
  USE WHEN: drinking at a tavern or feast, drowning your sorrows, celebrating, or being pressured or tricked into one more cup.
  Sometimes you drink yourself into a helpless stupor and pass out. Solo pose, FEMALE ONLY, no dialogue.
questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: PoseDrink_Execute
parameterMapping:
  - type: speaker
    name: akInitiator
    description: The woman taking a drink.
enabled: true
defaultPriority: 2
customCategory: SNBaka_Pose
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_busy"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimActorCountFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
