name: express_surprised
description: |
  The speaker's face registers surprise — raised brows, wide eyes, open mouth — for a few
  seconds.

  USE WHEN: the speaker is startled, shocked, or caught off guard right now — unexpected
  news, a sudden event, a revelation, or something they did not see coming.

  Purely a facial expression — no body movement, no dialogue. It fades on its own.

questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: ExpressSurprised_Execute

parameterMapping:
  - type: speaker
    name: akInitiator
    description: The character whose face shows the expression
  - type: dynamic
    name: akTarget
    description: Who they are reacting to (optional context; not required)

enabled: true
defaultPriority: 2
