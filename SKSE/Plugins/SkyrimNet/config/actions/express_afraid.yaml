name: express_afraid
description: |
  The speaker's face fills with fear — wide eyes, raised brows, a frightened look — for a
  few seconds.

  USE WHEN: the speaker feels fear, dread, alarm, or intimidation right now — being
  threatened, cornered, overpowered, witnessing something terrifying, or anticipating harm.

  Purely a facial expression — no body movement, no dialogue. It fades on its own.

questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: ExpressAfraid_Execute

parameterMapping:
  - type: speaker
    name: akInitiator
    description: The character whose face shows the expression
  - type: dynamic
    name: akTarget
    description: Who they are reacting to (optional context; not required)

enabled: true
defaultPriority: 2
