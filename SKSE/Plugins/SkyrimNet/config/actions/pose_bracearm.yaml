name: PoseBraceArm
description: |
  YOU hold your own arm, reserved and self-conscious, and hold it.
  USE WHEN: shy, nervous, uneasy, bracing yourself, or waiting awkwardly.
  Solo gesture, no target, no dialogue.
questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: PoseBraceArm_Execute
parameterMapping:
  - type: speaker
    name: akInitiator
    description: The character holding their own arm.
enabled: true
defaultPriority: 2
customCategory: SNBaka_Pose
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_busy"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimActorCountFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
