name: PoseDogeza
description: |
  YOU drop to the ground in a deep, forehead-to-floor grovelling bow (dogeza) and hold it. The most
  extreme show of apology, submission, or pleading.
  USE WHEN: apologizing profusely, begging for your life or forgiveness, debasing yourself, or
  showing total submission to someone. Holds a while; ends on its own or if a fight starts.
  Solo body pose, no target, no dialogue.
questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: PoseDogeza_Execute
parameterMapping:
  - type: speaker
    name: akInitiator
    description: The character who grovels.
enabled: true
defaultPriority: 2
customCategory: SNBaka_Pose
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_busy"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimActorCountFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
