name: express_happy
description: |
  The speaker adopts a happy, smiling facial expression for a few seconds — joy, warmth,
  amusement, affection, or delight shows on their face.

  USE WHEN: the speaker feels or wants to convey happiness, fondness, satisfaction, or
  playful good humor in the current moment — greeting someone they like, hearing good news,
  flirting warmly, or simply being pleased.

  This is purely a facial expression — no body movement, no dialogue. It fades on its own.
  DO NOT USE for forced/sarcastic smiles in hostile scenes (use the mood that truly fits).

questEditorId: SkyrimNet_BakaIntegration
scriptName: SkyrimNet_BakaIntegration
executionFunctionName: ExpressHappy_Execute

parameterMapping:
  - type: speaker
    name: akInitiator
    description: The character whose face shows the expression
  - type: dynamic
    name: akTarget
    description: Who they are reacting to (optional context; not required)

enabled: true
defaultPriority: 2
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimActorCountFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
